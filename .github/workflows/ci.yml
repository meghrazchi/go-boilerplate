name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Tidy modules
        run: go mod tidy

      - name: Check gofmt
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Run tests
        run: go test ./...

      - name: Run build
        run: go build -trimpath ./cmd/api

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.10.1
